<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Premium Ninja Tech – HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />

<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES  –  PALETA PREMIUM NINJA TECH
   ═══════════════════════════════════════════ */
:root {
  --ink:        #0d1117;   /* fondo profundo */
  --panel:      #131a26;   /* paneles */
  --surface:    #1c2740;   /* superficies */
  --border:     #2e4270;   /* bordes */

  --amber:      #e8923a;   /* naranja Naruto */
  --amber-glow: #ffc56a;   /* brillo naranja */
  --teal:       #2ecfcf;   /* cian chakra */
  --teal-dim:   #1a8a8a;
  --crimson:    #c93b3b;   /* peligro / HP bajo */
  --jade:       #3dba7a;   /* HP lleno */
  --violet:     #7c5cbf;   /* invocaciones / raro */

  --text-hi:    #e8e8f4;
  --text-mid:   #8899bb;
  --text-lo:    #4a5a7a;

  --btn-bg:     #162035;
  --btn-border: #2e4270;
  --btn-hover:  #1f3052;
  --btn-active: #0d1a2e;

  --radius:     4px;
  --font-hud:   'Rajdhani', sans-serif;
  --font-title: 'Orbitron', monospace;
  --font-jp:    'Noto Serif JP', serif;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  color: var(--text-hi);
  font-family: var(--font-hud);
  font-size: 16px;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════════════════════
   LAYOUT RAÍZ  –  PORTRAIT VERTICAL
   ═══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,  rgba(46,207,207,.07) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(232,146,58,.06) 0%, transparent 60%),
    var(--ink);
  padding: 10px 10px 10px;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

/* patrón sello de sombra */
#app::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(46,207,207,.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(46,207,207,.04) 40px);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   BLOQUE SUPERIOR  –  ESTADO DEL SHINOBI
   ═══════════════════════════════════════════ */
#hud-top {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  box-shadow: 0 0 18px rgba(46,207,207,.1);
}

/* ─── FILA AVATAR + IDENTIDAD + STATS ─── */
.avatar-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

/* Avatar */
.avatar-frame {
  flex-shrink: 0;
  width: 72px;
  height: 72px;
  border: 2px solid var(--teal);
  border-radius: var(--radius);
  background: var(--surface);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 12px rgba(46,207,207,.35);
}
.avatar-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.avatar-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
}
.avatar-corner {
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 0 14px 14px;
  border-color: transparent transparent var(--amber) transparent;
}

/* Identidad */
.identity {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 2px;
}
.char-name {
  font-family: var(--font-title);
  font-size: .9rem;
  color: var(--text-hi);
  letter-spacing: .5px;
  text-shadow: 0 0 8px rgba(232,146,58,.6);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-rank {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .72rem;
  color: var(--teal);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.rank-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); }

/* Stats en línea */
.stat-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.chip {
  display: flex;
  align-items: center;
  gap: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 6px;
  font-size: .7rem;
  font-weight: 600;
  white-space: nowrap;
}
.chip-icon { font-size: .8rem; }
.chip.atk  .chip-val { color: var(--amber); }
.chip.def  .chip-val { color: #5bc0fa; }
.chip.gold .chip-val { color: #f0d060; }

/* ─── BARRAS HP / MP / EXP ─── */
.bars-block {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.bar-label {
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: 1px;
  width: 24px;
  text-align: center;
}
.bar-label.hp  { color: var(--jade); }
.bar-label.mp  { color: var(--teal); }
.bar-label.exp { color: var(--amber); }

.bar-track {
  flex: 1;
  height: 8px;
  background: #0a1020;
  border-radius: 3px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}
.bar-track.exp-track { height: 6px; }

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .6s ease;
  position: relative;
}
.bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: rgba(255,255,255,.18);
  border-radius: 3px 3px 0 0;
}
.bar-fill.hp-fill  { background: linear-gradient(90deg, #2d9e55, #5de68c); }
.bar-fill.mp-fill  { background: linear-gradient(90deg, #1a8a8a, #2ecfcf); }
.bar-fill.exp-fill { background: linear-gradient(90deg, #b5621a, #e8923a); }

/* pulso de barra */
.bar-fill.hp-fill  { animation: pulse-hp  2.5s ease-in-out infinite; }
.bar-fill.mp-fill  { animation: pulse-mp  3s   ease-in-out infinite; }
@keyframes pulse-hp { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)} }
@keyframes pulse-mp { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }

.bar-info {
  font-size: .62rem;
  color: var(--text-mid);
  min-width: 68px;
  text-align: right;
  white-space: nowrap;
}
.bar-info span { color: var(--text-hi); font-weight: 600; }

.exp-next {
  font-size: .58rem;
  color: var(--text-lo);
  text-align: right;
  margin-top: -2px;
  margin-right: 2px;
}

/* ═══════════════════════════════════════════
   BLOQUE CENTRAL  –  VENTANA DE ACCIÓN
   ═══════════════════════════════════════════ */
#hud-center {
  position: relative;
  z-index: 1;
  flex: 1;
  min-height: 0;
  background: rgba(19, 26, 38, .70);  /* 70 % opacidad */
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}



/* feed de combate idle */
.combat-feed {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.combat-feed::-webkit-scrollbar { width: 3px; }
.combat-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed-line {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: .75rem;
  opacity: 0;
  animation: fadeSlide .4s forwards;
}
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.feed-time  { color: var(--text-lo); font-size: .6rem; flex-shrink: 0; }
.feed-actor { color: var(--amber);  font-weight: 700; flex-shrink: 0; }
.feed-msg   { color: var(--text-hi); flex: 1; }
.feed-dmg   { color: var(--crimson); font-weight: 700; flex-shrink: 0; }
.feed-heal  { color: var(--jade);   font-weight: 700; flex-shrink: 0; }
.feed-jutsu { color: var(--teal);   font-style: italic; font-weight: 600; flex-shrink: 0; }

/* info de misión activa */
.mission-card {
  margin: 8px 12px;
  background: rgba(28,39,64,.8);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mission-title {
  font-size: .72rem;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: .5px;
}
.mission-desc { font-size: .68rem; color: var(--text-mid); }
.mission-prog-track {
  height: 4px; background: #0a1020; border-radius: 2px; overflow: hidden;
  margin-top: 2px;
}
.mission-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--amber-glow));
  border-radius: 2px;
  transition: width .8s ease;
}

/* ═══════════════════════════════════════════
   BLOQUE INFERIOR  –  BARRA DE NAVEGACIÓN
   ═══════════════════════════════════════════ */
#hud-bottom {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
}

.nav-btn {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius);
  padding: 8px 4px;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s, box-shadow .15s;
  overflow: hidden;
  min-height: 56px;
  -webkit-user-select: none; user-select: none;
}
.nav-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
  pointer-events: none;
}
.nav-btn:hover  { background: var(--btn-hover); border-color: var(--teal-dim); }
.nav-btn:active { background: var(--btn-active); transform: scale(.95); }
.nav-btn.active {
  border-color: var(--teal);
  box-shadow: 0 0 10px rgba(46,207,207,.3), inset 0 0 8px rgba(46,207,207,.08);
}
.nav-btn.active .btn-icon { filter: drop-shadow(0 0 4px var(--teal)); }
.nav-btn.active .btn-label { color: var(--teal); }

.btn-icon  { font-size: 1.3rem; line-height: 1; }
.btn-label {
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-mid);
  text-align: center;
  line-height: 1.1;
}
.btn-badge {
  position: absolute;
  top: 3px; right: 4px;
  background: var(--crimson);
  color: #fff;
  font-size: .52rem;
  font-weight: 700;
  border-radius: 3px;
  padding: 1px 4px;
  line-height: 1.2;
}

/* ═══════════════════════════════════════════
   PARTÍCULAS DE EFECTOS
   ═══════════════════════════════════════════ */
.particle-container {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  top: 0; left: 0; right: 0; bottom: 0;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particle-anim .8s ease-out forwards;
}
.particle.smoke {
  border-radius: 50%;
  background: rgba(200,200,200,.5);
  filter: blur(3px);
}
.particle.chakra {
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal);
}
.particle.amber-spark {
  background: var(--amber);
  box-shadow: 0 0 4px var(--amber);
}
@keyframes particle-anim {
  0%   { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
}

/* ═══════════════════════════════════════════
   TEXTO FLOTANTE  –  FEEDBACK DE ESTADÍSTICAS
   ═══════════════════════════════════════════ */
.float-text {
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  font-family: var(--font-hud);
  font-weight: 700;
  font-size: .85rem;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
  animation: floatUp .9s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-45px); }
}

/* ═══════════════════════════════════════════
   OVERLAY / PANEL DE SECCIONES
   ═══════════════════════════════════════════ */
#section-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,12,20,.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  backdrop-filter: blur(4px);
}
#section-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.overlay-panel {
  background: var(--panel);
  border: 1px solid var(--teal);
  border-radius: var(--radius);
  padding: 20px 18px;
  width: min(340px, 90vw);
  box-shadow: 0 0 30px rgba(46,207,207,.2);
  animation: panelIn .25s ease;
}
@keyframes panelIn {
  from { transform: scale(.9) translateY(20px); opacity:0; }
  to   { transform: scale(1) translateY(0);   opacity:1; }
}
.overlay-panel h2 {
  font-family: var(--font-title);
  font-size: .9rem;
  color: var(--teal);
  margin-bottom: 10px;
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 8px;
}
.overlay-panel p { font-size: .78rem; color: var(--text-mid); line-height: 1.6; }
.overlay-close {
  display: block;
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  color: var(--text-hi);
  font-family: var(--font-hud);
  font-weight: 700;
  font-size: .75rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  width: 100%;
  transition: background .15s, border-color .15s;
}
.overlay-close:hover { background: var(--btn-hover); border-color: var(--teal); color: var(--teal); }

/* ═══════════════════════════════════════════
   DECORACIONES TOP
   ═══════════════════════════════════════════ */
.hud-corner {
  position: absolute;
  width: 10px; height: 10px;
  border-color: var(--teal);
  border-style: solid;
}
.hud-corner.tl { top: 0; left: 0;  border-width: 2px 0 0 2px; }
.hud-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
.hud-corner.bl { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
.hud-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

/* ═══════════════════════════════════════════
   RESPONSIVE  –  pantallas grandes / pequeñas
   ═══════════════════════════════════════════ */
@media (max-height: 700px) {
  .avatar-frame { width: 58px; height: 58px; }
  .nav-btn      { min-height: 46px; }
  .btn-icon     { font-size: 1.1rem; }
}
@media (min-height: 900px) {
  .nav-btn  { min-height: 68px; }
  .btn-icon { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     APP ROOT
     ══════════════════════════════════════════ -->
<div id="app">

  <!-- ─── BLOQUE SUPERIOR  :  ESTADO DEL SHINOBI ─── -->
  <section id="hud-top">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <div class="avatar-row">
      <!-- Avatar -->
      <div class="avatar-frame" id="avatarFrame">
        <div class="avatar-placeholder">🥷</div>
        <div class="avatar-corner"></div>
      </div>

      <!-- Identidad + stats -->
      <div class="identity">
        <div class="char-name" id="charName">UZUMAKI NARUTO</div>
        <div class="char-rank">
          <span class="rank-dot"></span>
          <span id="charRank">CHUNIN</span>
        </div>
        <div class="stat-chips">
          <div class="chip atk">
            <span class="chip-icon">⚔️</span>
            <span class="chip-label">ATK</span>
            <span class="chip-val" id="statAtk">1 240</span>
          </div>
          <div class="chip def">
            <span class="chip-icon">🛡️</span>
            <span class="chip-label">DEF</span>
            <span class="chip-val" id="statDef">880</span>
          </div>
          <div class="chip gold">
            <span class="chip-icon">💰</span>
            <span class="chip-label">ORO</span>
            <span class="chip-val" id="statGold">4 320</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Barras dinámicas -->
    <div class="bars-block">
      <!-- HP -->
      <div class="bar-row">
        <span class="bar-label hp">HP</span>
        <div class="bar-track">
          <div class="bar-fill hp-fill" id="hpFill" style="width:72%"></div>
        </div>
        <span class="bar-info"><span id="hpCur">720</span>/<span id="hpMax">1000</span> &nbsp;<span id="hpPct">72%</span></span>
      </div>
      <!-- MP -->
      <div class="bar-row">
        <span class="bar-label mp">MP</span>
        <div class="bar-track">
          <div class="bar-fill mp-fill" id="mpFill" style="width:58%"></div>
        </div>
        <span class="bar-info"><span id="mpCur">290</span>/<span id="mpMax">500</span> &nbsp;<span id="mpPct">58%</span></span>
      </div>
      <!-- EXP -->
      <div class="bar-row">
        <span class="bar-label exp">EXP</span>
        <div class="bar-track exp-track">
          <div class="bar-fill exp-fill" id="expFill" style="width:44%"></div>
        </div>
        <span class="bar-info" style="font-size:.6rem; color:var(--text-lo)">Nv. <span style="color:var(--amber)">23</span></span>
      </div>
      <div class="exp-next" id="expNext">4 400 / 10 000 EXP — Próx. nivel: 5 600</div>
    </div>
  </section>

  <!-- ─── BLOQUE CENTRAL  :  VENTANA DE ACCIÓN ─── -->
  <section id="hud-center">

    <!-- Misión activa -->
    <div class="mission-card">
      <div class="mission-title">🎯 MISIÓN A: Eliminar a Kabuto</div>
      <div class="mission-desc">Derrota 30 enemigos en la Zona Oculta · Tiempo: 18 min restantes</div>
      <div class="mission-prog-track">
        <div class="mission-prog-fill" id="missionProg" style="width:63%"></div>
      </div>
    </div>

    <!-- Feed de combate idle -->
    <div class="combat-feed" id="combatFeed"></div>
  </section>

  <!-- ─── BLOQUE INFERIOR  :  NAVEGACIÓN ─── -->
  <nav id="hud-bottom">
    <button class="nav-btn active" data-section="heroe"        id="btn-heroe">
      <span class="btn-icon">🥷</span>
      <span class="btn-label">HÉROE</span>
    </button>
    <button class="nav-btn" data-section="misiones"     id="btn-misiones">
      <span class="btn-icon">📜</span>
      <span class="btn-label">MISIONES</span>
      <span class="btn-badge" id="badgeMisiones">3</span>
    </button>
    <button class="nav-btn" data-section="clanes"       id="btn-clanes">
      <span class="btn-icon">⛩️</span>
      <span class="btn-label">CLANES</span>
    </button>
    <button class="nav-btn" data-section="eventos"      id="btn-eventos">
      <span class="btn-icon">🎴</span>
      <span class="btn-label">EVENTOS</span>
      <span class="btn-badge" id="badgeEventos">!</span>
    </button>
    <button class="nav-btn" data-section="jutsus"       id="btn-jutsus">
      <span class="btn-icon">🌀</span>
      <span class="btn-label">JUTSUS</span>
    </button>
    <button class="nav-btn" data-section="batallas"     id="btn-batallas">
      <span class="btn-icon">⚔️</span>
      <span class="btn-label">BATALLAS</span>
    </button>
    <button class="nav-btn" data-section="invocaciones" id="btn-invocaciones">
      <span class="btn-icon">✨</span>
      <span class="btn-label">INVOCAR</span>
    </button>
    <button class="nav-btn" data-section="habilidades"  id="btn-habilidades">
      <span class="btn-icon">🌿</span>
      <span class="btn-label">ÁRBOL</span>
    </button>
    <button class="nav-btn" data-section="ajustes"      id="btn-ajustes">
      <span class="btn-icon">⚙️</span>
      <span class="btn-label">AJUSTES</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- ─── CAPA DE PARTÍCULAS ─── -->
<div class="particle-container" id="particleContainer"></div>

<!-- ─── OVERLAY / PANEL DE SECCIÓN ─── -->
<div id="section-overlay">
  <div class="overlay-panel" id="overlayPanel">
    <h2 id="overlayTitle">🥷 SECCIÓN</h2>
    <p id="overlayDesc">Contenido de la sección.</p>
    <button class="overlay-close" id="overlayClose">✕ CERRAR</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════ -->
<script>
/* ─────────────────────────────────────────────
   ESTADO DEL JUEGO
───────────────────────────────────────────── */
const state = {
  hp: 720, hpMax: 1000,
  mp: 290, mpMax: 500,
  exp: 4400, expMax: 10000,
  gold: 4320, atk: 1240, def: 880,
  level: 23,
  activeSection: 'heroe',
  missionProg: 63,
};

/* ─────────────────────────────────────────────
   DATOS DE SECCIONES
───────────────────────────────────────────── */
const sections = {
  heroe:        { icon:'🥷', title:'HÉROE',           desc:'Consulta y mejora el equipo de tu shinobi. Cambia armadura, armas y accesorios para maximizar tu poder de combate.' },
  misiones:     { icon:'📜', title:'MISIONES',         desc:'Tienes 3 misiones pendientes. Completa misiones diarias, de historia y especiales para ganar EXP y recursos.' },
  clanes:       { icon:'⛩️', title:'CLANES',           desc:'Únete o crea tu clan. Participa en guerras de clanes y desbloquea jutsus exclusivos de linaje.' },
  eventos:      { icon:'🎴', title:'EVENTOS',          desc:'¡Evento especial activo! Festival del Chakra Lunar: consigue multiplicadores ×3 de EXP durante 2 horas.' },
  jutsus:       { icon:'🌀', title:'JUTSUS',           desc:'Gestiona tus técnicas ninja. Equipa hasta 4 jutsus activos y mejora sus rangos con sellos de chakra.' },
  batallas:     { icon:'⚔️', title:'BATALLAS',         desc:'Modo PvP y arena de rango. Desafía a otros jugadores y sube en la tabla clasificatoria mundial.' },
  invocaciones: { icon:'✨', title:'INVOCACIONES',     desc:'Invoca nuevos compañeros y objetos míticos. Utiliza pergaminos de convocación para obtener aliados S-Rank.' },
  habilidades:  { icon:'🌿', title:'ÁRBOL DE HABILIDAD', desc:'Asigna puntos de habilidad en ramas de Ninjutsu, Taijutsu y Genjutsu para personalizar tu estilo de combate.' },
  ajustes:      { icon:'⚙️', title:'AJUSTES',          desc:'Configura notificaciones, audio, gráficos y tu cuenta de shinobi. También puedes vincular tu aldea.' },
};

/* ─────────────────────────────────────────────
   FEED DE COMBATE IDLE
───────────────────────────────────────────── */
const combatLines = [
  { actor:'Naruto', msg:'usa', jutsu:'Rasengan', dmg:'-342' },
  { actor:'Naruto', msg:'ataca a', jutsu:'Kabuto', dmg:'-128' },
  { actor:'Kabuto',  msg:'contraataca', jutsu:'', dmg:'-89' },
  { actor:'Naruto', msg:'recupera chakra', jutsu:'', heal:'+50 MP' },
  { actor:'Naruto', msg:'usa', jutsu:'Kage Bunshin no Jutsu', dmg:'-210' },
  { actor:'Kabuto',  msg:'usa', jutsu:'Chakra Escalpelo', dmg:'-155' },
  { actor:'Naruto', msg:'bloquea el ataque de', jutsu:'Kabuto', dmg:'-0' },
  { actor:'Naruto', msg:'obtiene', jutsu:'', heal:'+80 EXP' },
  { actor:'Naruto', msg:'usa', jutsu:'Tajuu Kage Bunshin', dmg:'-480' },
  { actor:'Kabuto',  msg:'es derrotado!', jutsu:'', dmg:'' },
];

let feedIndex = 0;
function addFeedLine() {
  const feed = document.getElementById('combatFeed');
  const d = combatLines[feedIndex % combatLines.length];
  feedIndex++;

  const now = new Date();
  const time = `${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  const line = document.createElement('div');
  line.className = 'feed-line';
  line.style.animationDelay = '0s';

  const timeEl   = document.createElement('span'); timeEl.className = 'feed-time'; timeEl.textContent = time;
  const actorEl  = document.createElement('span'); actorEl.className = 'feed-actor'; actorEl.textContent = d.actor;
  const msgEl    = document.createElement('span'); msgEl.className = 'feed-msg';   msgEl.textContent = ' ' + d.msg + ' ';
  line.append(timeEl, actorEl, msgEl);

  if (d.jutsu) {
    const jutsuEl = document.createElement('span'); jutsuEl.className = 'feed-jutsu';
    jutsuEl.textContent = d.jutsu + ' ';
    line.append(jutsuEl);
  }
  if (d.dmg && d.dmg !== '-0' && d.dmg !== '') {
    const dmgEl = document.createElement('span'); dmgEl.className = 'feed-dmg';
    dmgEl.textContent = d.dmg;
    line.append(dmgEl);
  }
  if (d.heal) {
    const healEl = document.createElement('span'); healEl.className = 'feed-heal';
    healEl.textContent = d.heal;
    line.append(healEl);
  }

  feed.appendChild(line);
  feed.scrollTop = feed.scrollHeight;

  // mantener máx 30 líneas
  while (feed.children.length > 30) feed.removeChild(feed.firstChild);
}
setInterval(addFeedLine, 1600);

/* ─────────────────────────────────────────────
   SIMULACIÓN IDLE: HP, MP, EXP, GOLD
───────────────────────────────────────────── */
function updateBars() {
  // HP baja lentamente, sube con regeneración
  state.hp = Math.max(10, Math.min(state.hpMax, state.hp + (Math.random() > .65 ? 8 : -14)));
  // MP flota
  state.mp = Math.max(30, Math.min(state.mpMax, state.mp + (Math.random() > .45 ? 12 : -20)));
  // EXP sube
  state.exp = Math.min(state.expMax, state.exp + Math.floor(Math.random() * 28 + 8));
  // Gold sube
  state.gold += Math.floor(Math.random() * 12 + 3);

  const hpPct  = Math.round(state.hp  / state.hpMax  * 100);
  const mpPct  = Math.round(state.mp  / state.mpMax  * 100);
  const expPct = Math.round(state.exp / state.expMax * 100);

  document.getElementById('hpFill').style.width  = hpPct  + '%';
  document.getElementById('mpFill').style.width  = mpPct  + '%';
  document.getElementById('expFill').style.width = expPct + '%';

  document.getElementById('hpCur').textContent  = state.hp;
  document.getElementById('hpPct').textContent  = hpPct  + '%';
  document.getElementById('mpCur').textContent  = state.mp;
  document.getElementById('mpPct').textContent  = mpPct  + '%';
  document.getElementById('expNext').textContent =
    `${state.exp.toLocaleString()} / ${state.expMax.toLocaleString()} EXP — Próx. nivel: ${(state.expMax - state.exp).toLocaleString()}`;
  document.getElementById('statGold').textContent = state.gold.toLocaleString();

  // color HP crítico
  const fill = document.getElementById('hpFill');
  fill.style.background = hpPct < 25
    ? 'linear-gradient(90deg,#7a1a1a,#c93b3b)'
    : 'linear-gradient(90deg,#2d9e55,#5de68c)';

  // avance misión
  state.missionProg = Math.min(100, state.missionProg + .15);
  document.getElementById('missionProg').style.width = state.missionProg + '%';
  if (state.missionProg >= 100) state.missionProg = 0;
}
setInterval(updateBars, 800);

/* ─────────────────────────────────────────────
   PARTÍCULAS
───────────────────────────────────────────── */
function spawnParticles(x, y, type = 'chakra') {
  const container = document.getElementById('particleContainer');
  const count = type === 'smoke' ? 6 : 10;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = `particle ${type}`;

    const size = type === 'smoke'
      ? Math.random() * 18 + 10
      : Math.random() * 5 + 2;
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * (type === 'smoke' ? 45 : 55) + 10;
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;

    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x - size/2}px; top:${y - size/2}px;
      --tx:${tx}px; --ty:${ty}px;
      animation-delay:${Math.random() * .1}s;
      animation-duration:${Math.random() * .4 + .5}s;
    `;
    container.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

/* ─────────────────────────────────────────────
   TEXTO FLOTANTE
───────────────────────────────────────────── */
function spawnFloatText(x, y, text, color = '#2ecfcf') {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.cssText = `left:${x - 30}px; top:${y - 20}px; color:${color};`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

/* ─────────────────────────────────────────────
   NAVEGACIÓN DE BOTONES
───────────────────────────────────────────── */
const overlay      = document.getElementById('section-overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDesc  = document.getElementById('overlayDesc');
const overlayClose = document.getElementById('overlayClose');

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;

    // Efecto de partículas  (smoke + chakra)
    spawnParticles(cx, cy, 'smoke');
    spawnParticles(cx, cy, 'chakra');

    const sec = btn.dataset.section;

    // texto flotante con nombre de sección
    const labels = { heroe:'HÉROE', misiones:'MISIONES', clanes:'CLANES',
                     eventos:'EVENTOS', jutsus:'JUTSUS', batallas:'BATALLAS',
                     invocaciones:'INVOCAR', habilidades:'ÁRBOL', ajustes:'AJUSTES' };
    spawnFloatText(cx, cy, '▶ ' + (labels[sec] || sec), '#e8923a');

    // Marcar activo
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.activeSection = sec;

    // Abrir overlay
    const info = sections[sec];
    if (info) {
      overlayTitle.innerHTML = `${info.icon} ${info.title}`;
      overlayDesc.textContent = info.desc;
      overlay.classList.add('visible');
    }
  });
});

overlayClose.addEventListener('click', () => {
  overlay.classList.remove('visible');
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  spawnParticles(cx, cy, 'amber-spark');
});



/* ─────────────────────────────────────────────
   SEED INICIAL DEL FEED
───────────────────────────────────────────── */
for (let i = 0; i < 5; i++) addFeedLine();
</script>
</body>
</html>
