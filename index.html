<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz Habilidades - Idle RPG</title>
    <style>
        /* Regla estricta de dimensionamiento */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Fondo general transparente */
        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Cuadro color blanco 355x500 */
        #main-container {
            background-color: #ffffff;
            width: 355px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor interno que no supera los 350x495 */
        #inner-wrapper {
            width: 350px;
            height: 495px;
            position: relative;
            background-color: #1a1a1a; /* Diseño de alto contraste interno */
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* === PANEL DE BATALLA === */
        .battle-panel {
            padding: 10px;
            border-bottom: 2px solid #333;
        }
        
        .slots-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slot {
            width: 100px;
            height: 60px;
            background-color: #2a2a2a;
            border: 1px solid #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            border-radius: 4px;
        }

        .slot-title {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .btn-info {
            width: 100%;
            padding: 5px;
            background-color: #3a3a3a;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        /* === PANEL DE HABILIDADES === */
        .btn-toggle-skills {
            width: 100%;
            padding: 10px;
            background-color: #444;
            color: #fff;
            border: none;
            border-bottom: 2px solid #222;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .skills-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: none; /* Oculto por defecto */
            background-color: #111;
        }

        .skill-item {
            background-color: #222;
            border: 1px solid #444;
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .skill-item:hover {
            border-color: #888;
        }

        .skill-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .skill-emojis {
            font-size: 12px;
            color: #ccc;
        }

        /* === MODALES (INFO Y MEJORA) === */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .modal-header {
            padding: 10px;
            background-color: #333;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close {
            background: red;
            color: white;
            border: none;
            padding: 2px 8px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 2px;
        }

        .modal-content {
            padding: 10px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 12px;
        }

        /* Tabla Glosario */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #444;
            padding: 6px;
            text-align: left;
        }
        th {
            background-color: #333;
        }

        /* Panel Mejora */
        .upgrade-stats {
            background-color: #222;
            padding: 10px;
            border: 1px solid #444;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .upgrade-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 10px;
            background-color: #222;
            border-top: 1px solid #444;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            color: white;
        }

        .btn-upgrade { background-color: gray; cursor: not-allowed; } /* Por defecto gris por falta de oro */
        .btn-equip { background-color: #28a745; }
        .btn-unequip { background-color: #dc3545; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>

            const modal = document.getElementById('modal-info');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';

        // Toggle skills list
        function toggleSkills() {
            const area = document.getElementById('skills-area');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        // Renderizar tabla de glosario
        function renderInfoTable() {
            const tbody = document.querySelector('#info-table tbody');
            tbody.innerHTML = '';
            for (const [name, data] of Object.entries(dbSkills)) {
                tbody.innerHTML += `
                    <tr>
                        <td>🔹 ${name}</td>
                        <td>${data.desc}</td>
                    </tr>
                `;
            }
        }

        // Renderizar lista de habilidades
        function renderSkillsList() {
            const area = document.getElementById('skills-area');
            area.innerHTML = '';
            for (const [name, data] of Object.entries(dbSkills)) {
                area.innerHTML += `
                    <div class="skill-item" onclick="openUpgrade('${name}')">
                        <div class="skill-name">${data.icon} ${name}</div>
                        <div class="skill-emojis">${data.emojiStats}</div>
                    </div>
                `;
            }
        }

        // Abrir panel de mejora
        function openUpgrade(skillName) {
            currentSelectedSkill = skillName;
            const data = dbSkills[skillName];
            const level = playerState.skillsLevel[skillName];
            const currentStats = data.levels[level - 1];
            const nextStats = data.levels[level] || currentStats; // Evitar error si max level

            const content = document.getElementById('upgrade-content');
            
            // Construir texto de estadísticas dinámicamente basado en la BD
            let statsAhoraHTML = '';
            let statsDespuesHTML = '';
            
            for(let key in currentStats) {
                if(key !== 'prob' && key !== 'mp') {
                    statsAhoraHTML += `🟢 ${key.charAt(0).toUpperCase() + key.slice(1)}: ${currentStats[key]}  `;
                    statsDespuesHTML += `⬆️ ${key.charAt(0).toUpperCase() + key.slice(1)}: ${nextStats[key]}  `;
                }
            }
            statsAhoraHTML += `<br>📈 Prob: ${currentStats.prob} 🔵 MP: ${currentStats.mp}`;
            statsDespuesHTML += `<br>📈 Prob: ${nextStats.prob} 🔵 MP: ${nextStats.mp}`;

            content.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">${data.icon} ${skillName.toUpperCase()} (Nivel ${level})</div>
                <div style="color: #aaa; margin-bottom: 15px;">Duración: ${data.duration}</div>
                
                <div class="upgrade-stats">
                    <div style="color: #4CAF50; margin-bottom: 5px;">📊 ESTADÍSTICAS ACTUALES (AHORA):</div>
                    ${statsAhoraHTML}
                </div>
                
                <div class="upgrade-stats" style="border-color: #007bff;">
                    <div style="color: #007bff; margin-bottom: 5px;">⬇️ AL MEJORAR A NIVEL ${level < 10 ? level + 1 : 'MAX'} OBTENDRÁS (DESPUÉS):</div>
                    ${level < 10 ? statsDespuesHTML : 'NIVEL MÁXIMO ALCANZADO'}
                </div>
            `;

            // Configurar botones
            const btnEquipToggle = document.getElementById('btn-equip-toggle');
            if (playerState.equipped.includes(skillName)) {
                btnEquipToggle.innerText = '❌ QUITAR';
                btnEquipToggle.className = 'btn-action btn-unequip';
            } else {
                btnEquipToggle.innerText = '✅ EQUIPAR';
                btnEquipToggle.className = 'btn-action btn-equip';
            }

            document.getElementById('modal-upgrade').style.display = 'flex';
        }

        function closeUpgrade() {
            document.getElementById('modal-upgrade').style.display = 'none';
        }

        // Logica Equipar/Quitar
        function toggleEquip() {
            if (!currentSelectedSkill) return;

            const index = playerState.equipped.indexOf(currentSelectedSkill);
            
            if (index !== -1) {
                // Quitar
                playerState.equipped[index] = null;
            } else {
                // Equipar en primera ranura libre
                const freeIndex = playerState.equipped.indexOf(null);
                if (freeIndex !== -1) {
                    playerState.equipped[freeIndex] = currentSelectedSkill;
                } else {
                    alert("Ranuras llenas. Quita una habilidad primero.");
                    return;
                }
            }
            
            updateSlots();
            openUpgrade(currentSelectedSkill); // Actualizar botones del modal
        }

        // Actualizar UI de ranuras
        function updateSlots() {
            for (let i = 0; i < 3; i++) {
                const slotContent = document.querySelector(`#slot-${i + 1} .slot-content`);
                const skillName = playerState.equipped[i];
                if (skillName) {
                    slotContent.innerHTML = `${dbSkills[skillName].icon}<br>${skillName}`;
                } else {
                    slotContent.innerHTML = `Vacío`;
                }
            }
        }

        // Arrancar
        window.onload = init;
    </script>
</body>
</html>
