<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misiones RPG - Naruto Idle</title>
    <style>
        :root {
            --ink:     #0d1117;
            --panel:   #131a26;
            --surface: #1c2740;
            --btn-bg:  #162035;
            --overlay: rgba(8, 12, 20, 0.85);
            --text:    #c9d1d9;
            --text-dim:#7a8898;
        }

        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            box-sizing: border-box;
        }

        #game-container {
            width: 355px;
            height: 500px;
            background-color: var(--panel);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .screen {
            width: 335px;
            width: calc(100% - 20px);
            max-width: 335px;
            height: 475px;
            max-height: 480px;
            overflow-y: auto;
            overflow-x: hidden;
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: transparent;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            box-sizing: border-box;
            padding: 5px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* ── Botones base (menú principal y rangos) ── */
        .menu-button, .rank-button, .back-button, .stop-button {
            border-radius: 30px;
            padding: 12px 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-sizing: border-box;
            width: 100%;
            flex-shrink: 0;
            border: 2px solid;
        }

        .menu-button {
            background: var(--btn-bg);
            border-color: rgba(255,255,255,0.12);
            color: var(--text);
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }
        .menu-button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .rank-button:active, .back-button:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        /* ── Rangos: se conservan los colores de pergamino ── */
        .rank-d {
            background: #1b3a1e;
            border-color: #2e7d32;
            color: #a5d6a7;
            box-shadow: 0 4px 0 #1b5e20;
        }
        .rank-c {
            background: #0d2438;
            border-color: #0277bd;
            color: #80d4ff;
            box-shadow: 0 4px 0 #01478a;
        }
        .rank-b {
            background: #2c1a00;
            border-color: #ef6c00;
            color: #ffb74d;
            box-shadow: 0 4px 0 #a34a00;
        }
        .rank-a {
            background: #2a0a0a;
            border-color: #b71c1c;
            color: #ef9a9a;
            box-shadow: 0 4px 0 #7f0000;
        }
        .rank-s {
            background: #1e0a2e;
            border-color: #6a1b9a;
            color: #ce93d8;
            box-shadow: 0 4px 0 #38006b;
        }

        /* ── Misiones (scrolls) ── */
        .mission-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 10px 8px;
            background: var(--surface);
            border-left: 8px solid;
            border-top: 1px solid rgba(255,255,255,0.06);
            border-right: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 12px;
            line-height: 1.4;
            gap: 5px;
            color: var(--text);
            transition: all 0.1s ease;
        }

        .mission-item:not(.locked):active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .mission-header {
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .mission-details {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .mission-left, .mission-right {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .mission-left span, .mission-right span {
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 20px;
            color: var(--text-dim);
        }

        .mission-lock {
            text-align: center;
            background: rgba(183,28,28,0.2);
            color: #ef9a9a;
            border-radius: 20px;
            padding: 4px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(183,28,28,0.5);
        }

        /* Colores de borde izquierdo por rango (en misiones) */
        .mission-rank-d { border-left-color: #2e7d32; }
        .mission-rank-d .mission-header { color: #a5d6a7; }

        .mission-rank-c { border-left-color: #0277bd; }
        .mission-rank-c .mission-header { color: #80d4ff; }

        .mission-rank-b { border-left-color: #ef6c00; }
        .mission-rank-b .mission-header { color: #ffb74d; }

        .mission-rank-a { border-left-color: #b71c1c; }
        .mission-rank-a .mission-header { color: #ef9a9a; }

        .mission-rank-s { border-left-color: #6a1b9a; }
        .mission-rank-s .mission-header { color: #ce93d8; }

        .locked {
            opacity: 0.5;
            filter: grayscale(0.6);
        }

        /* ── Botón volver ── */
        .back-button {
            background: var(--btn-bg);
            border-color: rgba(255,255,255,0.1);
            color: var(--text-dim);
            margin-top: 5px;
            font-size: 14px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4);
        }

        /* ── Pantalla de batalla ── */
        #battle-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 130px;
            margin: 5px 0;
        }

        .character-card {
            width: 45%;
            background: #112240;
            border-radius: 20px;
            padding: 8px;
            box-sizing: border-box;
            border: 3px solid #1e4d8c;
            text-align: center;
            box-shadow: 0 5px 0 #0d2d5a;
            position: relative;
        }

        .enemy-card {
            width: 45%;
            background: #2a0a0a;
            border-radius: 20px;
            padding: 8px;
            box-sizing: border-box;
            border: 3px solid #b71c1c;
            text-align: center;
            box-shadow: 0 5px 0 #7f0000;
            position: relative;
        }

        .card-emoji {
            font-size: 40px;
            line-height: 1.2;
        }

        .hp-bar, .mp-bar {
            height: 10px;
            border-radius: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            background: #d32f2f;
            transition: width 0.2s;
        }

        .mp-fill {
            height: 100%;
            width: 100%;
            background: #1565c0;
            transition: width 0.2s;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            font-weight: bold;
        }

        .combat-log {
            background: var(--overlay);
            color: #c9d1d9;
            border-radius: 15px;
            padding: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.08);
            margin: 5px 0;
            display: flex;
            flex-direction: column-reverse;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 3px 0;
            color: var(--text);
        }

        .stop-button {
            background: #7f0000;
            border-color: #b71c1c;
            border: 2px solid #b71c1c;
            color: #ffcdd2;
            font-size: 18px;
            padding: 15px;
            margin: 5px 0;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e0000;
            transition: all 0.1s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .stop-button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        .battle-controls {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-menu-screen" class="screen">
            <div id="main-misiones" class="menu-button">⚔️ MISIONES RANGO ⚔️</div>
        </div>

        <div id="rank-list-screen" class="screen hidden">
            <div id="rank-D" class="rank-button rank-d">📜 MISION RANGO D</div>
            <div id="rank-C" class="rank-button rank-c">🔥 MISION RANGO C</div>
            <div id="rank-B" class="rank-button rank-b">🌪️ MISION RANGO B</div>
            <div id="rank-A" class="rank-button rank-a">💀 MISION RANGO A</div>
            <div id="rank-S" class="rank-button rank-s">👑 MISION RANGO S</div>
            <div class="back-button" id="back-to-main-from-ranks">⬅️ Volver</div>
        </div>

        <div id="missions-screen" class="screen hidden">
            <div class="back-button" id="back-to-ranks-from-missions">⬅️ Volver a Rangos</div>
        </div>

        <div id="battle-screen" class="screen hidden">
            <div class="back-button" id="back-from-battle-to-main">⬅️ Abandonar misión</div>

            <div class="battle-arena">
                <div class="character-card" id="character-card" style="position: relative; top: 0%; left: 0%; width: 45%;">
                    <div class="card-emoji">🥷</div>
                    <div class="hp-bar"><div class="hp-fill" id="character-hp-fill" style="width: 100%;"></div></div>
                    <div class="mp-bar"><div class="mp-fill" id="character-mp-fill" style="width: 100%;"></div></div>
                    <div class="bar-labels"><span>❤️</span><span>💙</span></div>
                </div>

                <div class="enemy-card" id="enemy-card" style="position: relative; top: 0%; right: 0%; width: 45%;">
                    <div class="card-emoji" id="enemy-emoji">👹</div>
                    <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill" style="width: 100%;"></div></div>
                    <div class="mp-bar"><div class="mp-fill" id="enemy-mp-fill" style="width: 100%;"></div></div>
                    <div class="bar-labels"><span>❤️</span><span>💙</span></div>
                </div>
            </div>

            <div class="combat-log" id="combat-log"></div>
            <div class="stop-button" id="stop-battle-btn">⏹️ DETENER</div>
        </div>
    </div>

    <script>
        (function() {
            const missionsData = {
                D: [
                    { name: "Eliminar lobos hambrientos", xp: 2, gold: 4, hp: 138, atk: 25, def: 17, lvl: 1 },
                    { name: "Recuperar suministros robados por goblins", xp: 4, gold: 8, hp: 174, atk: 43, def: 28, lvl: 3 },
                    { name: "Proteger la aldea de jabalíes", xp: 6, gold: 12, hp: 210, atk: 61, def: 39, lvl: 5 },
                    { name: "Investigar ruinas infestadas de ratas gigantes", xp: 8, gold: 16, hp: 246, atk: 78, def: 50, lvl: 7 },
                    { name: "Escoltar a un mercader (bandido)", xp: 9, gold: 18, hp: 264, atk: 87, def: 55, lvl: 9 },
                    { name: "Cazar una bestia nocturna", xp: 10, gold: 20, hp: 282, atk: 96, def: 61, lvl: 12 }
                ],
                C: [
                    { name: "Limpiar una mina de murciélagos vampíricos", xp: 12, gold: 24, hp: 318, atk: 113, def: 72, lvl: 14 },
                    { name: "Derrotar a un grupo de orcos merodeadores", xp: 14, gold: 28, hp: 354, atk: 131, def: 83, lvl: 16 },
                    { name: "Rescatar a un rehén de los bandidos", xp: 16, gold: 32, hp: 390, atk: 149, def: 94, lvl: 18 },
                    { name: "Eliminar una amenaza de lobos de las nieves", xp: 18, gold: 36, hp: 426, atk: 166, def: 105, lvl: 20 },
                    { name: "Recuperar un artefacto custodiado por esqueletos", xp: 19, gold: 38, hp: 444, atk: 175, def: 110, lvl: 22 },
                    { name: "Acabar con un troll de las colinas", xp: 20, gold: 40, hp: 462, atk: 184, def: 116, lvl: 24 }
                ],
                B: [
                    { name: "Exterminar una colonia de arácnidos gigantes", xp: 22, gold: 44, hp: 498, atk: 201, def: 127, lvl: 28 },
                    { name: "Detener a un invoca demonios menores", xp: 24, gold: 48, hp: 534, atk: 219, def: 138, lvl: 32 },
                    { name: "Proteger una Ciudad de ataque de grifos salvajes", xp: 26, gold: 52, hp: 570, atk: 237, def: 149, lvl: 36 },
                    { name: "Investigar desapariciones en un bosque encantado", xp: 28, gold: 56, hp: 606, atk: 254, def: 160, lvl: 40 },
                    { name: "Derrotar a un caballero oscuro errante", xp: 29, gold: 58, hp: 624, atk: 263, def: 165, lvl: 45 },
                    { name: "Asaltar una fortaleza de ogros", xp: 30, gold: 60, hp: 642, atk: 272, def: 171, lvl: 50 }
                ],
                A: [
                    { name: "Eliminar a un dragón joven", xp: 32, gold: 64, hp: 678, atk: 289, def: 182, lvl: 55 },
                    { name: "Infiltrarse en una base de asesinos", xp: 34, gold: 68, hp: 714, atk: 307, def: 193, lvl: 50 },
                    { name: "Proteger una ciudad de un ataque", xp: 36, gold: 72, hp: 750, atk: 325, def: 204, lvl: 55 },
                    { name: "Recuperar un tesoro de una tumba maldita", xp: 38, gold: 76, hp: 786, atk: 342, def: 215, lvl: 60 },
                    { name: "Derrotar a un guerrero legendario", xp: 39, gold: 78, hp: 804, atk: 351, def: 220, lvl: 65 },
                    { name: "Acabar con un demonio de las sombras", xp: 40, gold: 80, hp: 822, atk: 360, def: 226, lvl: 70 }
                ],
                S: [
                    { name: "Enfrentar a un dragón adulto", xp: 50, gold: 100, hp: 1002, atk: 448, def: 281, lvl: 75 },
                    { name: "Derrotar a un señor demonio menor", xp: 60, gold: 120, hp: 1182, atk: 536, def: 336, lvl: 80 },
                    { name: "Salvar el reino de un lich", xp: 70, gold: 140, hp: 1362, atk: 624, def: 391, lvl: 85 },
                    { name: "Enfrentar a un titán antiguo", xp: 80, gold: 160, hp: 1542, atk: 712, def: 446, lvl: 90 },
                    { name: "Combatir a un dios olvidado", xp: 90, gold: 180, hp: 1722, atk: 800, def: 501, lvl: 95 },
                    { name: "Derrotar al dragón anciano", xp: 100, gold: 200, hp: 1902, atk: 808, def: 556, lvl: 100 }
                ]
            };

            let currentScreen = 'main';
            let battleInterval = null;
            let battleActive = false;
            let playerStats = { hp: 200, maxHp: 200, mp: 100, maxMp: 100, atk: 20, def: 15, lvl: 1 };
            let currentEnemy = null;
            let enemyIndex = 0;
            let currentMissionList = [];
            let currentRank = 'D';

            const mainScreen = document.getElementById('main-menu-screen');
            const rankScreen = document.getElementById('rank-list-screen');
            const missionsScreen = document.getElementById('missions-screen');
            const battleScreen = document.getElementById('battle-screen');

            document.getElementById('main-misiones').addEventListener('click', () => {
                mainScreen.classList.add('hidden');
                rankScreen.classList.remove('hidden');
                currentScreen = 'ranks';
            });

            document.getElementById('rank-D').addEventListener('click', () => showMissions('D'));
            document.getElementById('rank-C').addEventListener('click', () => showMissions('C'));
            document.getElementById('rank-B').addEventListener('click', () => showMissions('B'));
            document.getElementById('rank-A').addEventListener('click', () => showMissions('A'));
            document.getElementById('rank-S').addEventListener('click', () => showMissions('S'));

            document.getElementById('back-to-main-from-ranks').addEventListener('click', () => {
                rankScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                currentScreen = 'main';
            });

            document.getElementById('back-to-ranks-from-missions').addEventListener('click', () => {
                missionsScreen.classList.add('hidden');
                rankScreen.classList.remove('hidden');
                currentScreen = 'ranks';
                stopBattleAndGoToMain();
            });

            document.getElementById('back-from-battle-to-main').addEventListener('click', stopBattleAndGoToMain);
            document.getElementById('stop-battle-btn').addEventListener('click', stopBattleAndGoToMain);

            function showMissions(rank) {
                currentRank = rank;
                const missions = missionsData[rank];
                const backButton = document.getElementById('back-to-ranks-from-missions');
                missionsScreen.innerHTML = '';

                missions.forEach((mission, index) => {
                    const missionDiv = document.createElement('div');
                    missionDiv.className = `mission-item mission-rank-${rank.toLowerCase()} ${playerStats.lvl < mission.lvl ? 'locked' : ''}`;

                    missionDiv.innerHTML = `
                        <div class="mission-header">${mission.name}</div>
                        <div class="mission-details">
                            <div class="mission-left">
                                <span>⚡ XP: ${mission.xp}</span>
                                <span>💰 Oro: ${mission.gold}</span>
                            </div>
                            <div class="mission-right">
                                <span>❤️ HP: ${mission.hp}</span>
                                <span>⚔️ ATK: ${mission.atk}</span>
                                <span>🛡️ DEF: ${mission.def}</span>
                            </div>
                        </div>
                        ${playerStats.lvl < mission.lvl ? '<div class="mission-lock">🔒 Nivel mínimo: ' + mission.lvl + '</div>' : ''}
                    `;

                    if (playerStats.lvl >= mission.lvl) {
                        missionDiv.addEventListener('click', () => startBattle(rank, index));
                    } else {
                        missionDiv.style.pointerEvents = 'none';
                    }

                    missionsScreen.appendChild(missionDiv);
                });

                missionsScreen.appendChild(backButton);
                rankScreen.classList.add('hidden');
                missionsScreen.classList.remove('hidden');
                currentScreen = 'missions';
            }

            function startBattle(rank, missionIndex) {
                if (battleInterval) { clearInterval(battleInterval); battleInterval = null; }
                currentMissionList = missionsData[rank];
                enemyIndex = missionIndex;
                loadEnemy(enemyIndex);
                playerStats.hp = playerStats.maxHp;
                playerStats.mp = playerStats.maxMp;

                missionsScreen.classList.add('hidden');
                rankScreen.classList.add('hidden');
                mainScreen.classList.add('hidden');
                battleScreen.classList.remove('hidden');
                currentScreen = 'battle';
                document.getElementById('combat-log').innerHTML = '';

                battleActive = true;
                battleInterval = setInterval(() => {
                    if (!battleActive) return;
                    if (playerStats.hp > 0 && currentEnemy.hp > 0) {
                        let dmg = Math.max(1, Math.floor(playerStats.atk - currentEnemy.def / 3 + Math.random() * 8));
                        currentEnemy.hp -= dmg;
                        if (currentEnemy.hp < 0) currentEnemy.hp = 0;
                        addLog(`🥷 Atacas y causas ${dmg} daño.`);
                        updateBars();
                        if (currentEnemy.hp <= 0) {
                            addLog(`💀 ¡Enemigo derrotado! +${currentMissionList[enemyIndex].xp} XP y +${currentMissionList[enemyIndex].gold} Oro.`);
                            enemyIndex = (enemyIndex + 1) % currentMissionList.length;
                            loadEnemy(enemyIndex);
                            addLog(`⚔️ Nuevo enemigo: ${currentEnemy.name}`);
                        }
                    }
                    if (playerStats.hp > 0 && currentEnemy.hp > 0) {
                        let dmg = Math.max(1, Math.floor(currentEnemy.atk - playerStats.def / 3 + Math.random() * 6));
                        playerStats.hp -= dmg;
                        if (playerStats.hp < 0) playerStats.hp = 0;
                        addLog(`👹 ${currentEnemy.name} ataca y causa ${dmg} daño.`);
                        updateBars();
                        if (playerStats.hp <= 0) {
                            addLog(`😵 Has sido derrotado...`);
                            battleActive = false;
                            clearInterval(battleInterval);
                            battleInterval = null;
                        }
                    }
                    updateBars();
                }, 700);
            }

            function loadEnemy(index) {
                const mission = currentMissionList[index];
                currentEnemy = { name: mission.name, hp: mission.hp, maxHp: mission.hp, atk: mission.atk, def: mission.def, xp: mission.xp, gold: mission.gold };
                let emoji = '👹';
                const n = mission.name.toLowerCase();
                if (n.includes('lobo')) emoji = '🐺';
                else if (n.includes('dragón') || n.includes('dragon')) emoji = '🐉';
                else if (n.includes('demonio')) emoji = '👿';
                else if (n.includes('ogro') || n.includes('troll')) emoji = '👹';
                else if (n.includes('araña') || n.includes('arácnido')) emoji = '🕷️';
                else if (n.includes('esqueleto')) emoji = '💀';
                else if (n.includes('bandido') || n.includes('merodeador')) emoji = '⚔️';
                else if (n.includes('rata')) emoji = '🐀';
                else if (n.includes('jabalí')) emoji = '🐗';
                else if (n.includes('grifo')) emoji = '🦅';
                else if (n.includes('caballero')) emoji = '⚔️';
                else if (n.includes('titán')) emoji = '🗿';
                else if (n.includes('dios')) emoji = '👑';
                document.getElementById('enemy-emoji').innerText = emoji;
                updateBars();
            }

            function updateBars() {
                document.getElementById('character-hp-fill').style.width = Math.max(0, (playerStats.hp / playerStats.maxHp) * 100) + '%';
                document.getElementById('character-mp-fill').style.width = (playerStats.mp / playerStats.maxMp) * 100 + '%';
                if (currentEnemy) document.getElementById('enemy-hp-fill').style.width = Math.max(0, (currentEnemy.hp / currentEnemy.maxHp) * 100) + '%';
                document.getElementById('enemy-mp-fill').style.width = '100%';
            }

            function addLog(message) {
                const logDiv = document.getElementById('combat-log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = message;
                logDiv.insertBefore(entry, logDiv.firstChild);
                if (logDiv.children.length > 15) logDiv.removeChild(logDiv.lastChild);
            }

            function stopBattleAndGoToMain() {
                if (battleInterval) { clearInterval(battleInterval); battleInterval = null; }
                battleActive = false;
                battleScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                rankScreen.classList.add('hidden');
                missionsScreen.classList.add('hidden');
                currentScreen = 'main';
            }

            window.setCharacterPosition = (t, l) => { document.getElementById('character-card').style.top = t + '%'; document.getElementById('character-card').style.left = l + '%'; };
            window.setEnemyPosition = (t, r) => { document.getElementById('enemy-card').style.top = t + '%'; document.getElementById('enemy-card').style.right = r + '%'; };
            window.setCharacterSize = w => { document.getElementById('character-card').style.width = w + '%'; };
            window.setEnemySize = w => { document.getElementById('enemy-card').style.width = w + '%'; };

            mainScreen.classList.remove('hidden');
        })();
    </script>
</body>
</html>
